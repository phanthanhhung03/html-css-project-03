<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Besnik</title>

        <!-- RESET CSS -->
        <link rel="stylesheet" href="./assets/css/reset.css" />

        <!-- STYLE -->
        <link rel="stylesheet" href="./assets/css/style.css" />

        <!-- FONT -->
        <link rel="stylesheet" href="./assets/font/stylesheet.css" />
    </head>
    <body style="height: 10000px">
        <header class="header fixed">
            <div class="main-content">
                <div class="body">
                    <img
                        src="./assets/img/Logo-Black.svg"
                        alt="Besnik."
                        class="logo"
                    />
                    <nav class="nav">
                        <ul>
                            <li class="active">
                                <a href="#!">Home</a>
                            </li>
                            <li>
                                <a href="#!">Featurews</a>
                            </li>
                            <li>
                                <a href="#!">Pricing</a>
                            </li>
                            <li>
                                <a href="#!">About</a>
                            </li>
                            <li>
                                <a href="#!">Contact</a>
                            </li>
                        </ul>
                    </nav>
                    <div class="action">
                        <a href="#!" class="btn sign-in-btn">Sign in</a>
                        <a href="#!" class="btn sign-up-btn active">Sign up</a>
                    </div>
                </div>
            </div>
        </header>

        <main>
            <!-- HERO -->
            <div class="hero">
                <div class="main-content">
                    <div class="body">
                        <!-- Hero Left -->
                        <div class="content-block">
                            <p class="eyebrow">😎 EASY LEARNING PLATFORM</p>
                            <h1 class="heading lv1">
                                Words learner come here.
                            </h1>
                            <p class="desc">
                                Build skills with courses, certificates, and get
                                online knowledge from our
                                <span class="nowrap">world-class</span>
                                platform.
                            </p>
                            <div class="cta-group">
                                <a href="" class="btn btn-cta">Get Started</a>
                                <a href="" class="btn btn-play"
                                    ><img
                                        src="./assets/icon/Play-button.svg"
                                        alt=""
                                /></a>
                            </div>
                        </div>
                        <!-- Hero right -->
                        <div class="media-block">
                            <img
                                src="./assets/img/hero-img.jpg"
                                alt="EASY LEARNING PLATFORM"
                                class="img"
                            />
                            <!-- Courses -->
                            <div class="media-card media-card--courses">
                                <div class="book-icon">
                                    <img
                                        src="./assets/icon/Book.svg"
                                        alt="Courses"
                                    />
                                </div>
                                <p class="title">Courses 1000+</p>
                            </div>
                            <!-- Schedules -->
                            <div class="media-card media-card--schedules">
                                <p class="title">Schedules</p>
                                <div class="schedule-lines">
                                    <span class="line"></span>
                                    <span class="line"></span>
                                    <span class="line"></span>
                                    <span class="line"></span>
                                </div>
                            </div>
                            <!-- Students -->
                            <div class="media-card media-card--students">
                                <p class="title">Our Active Students</p>
                                <div class="avatars">
                                    <img src="./assets/img/hero-avatar-1.jpg" alt="" class="avatar">
                                    <img src="./assets/img/hero-avatar-2.jpg" alt="" class="avatar">
                                    <img src="./assets/img/hero-avatar-3.jpg" alt="" class="avatar">
                                    <img src="./assets/img/hero-avatar-4.jpg" alt="" class="avatar">
                                    <div class="avatar quantiy-students">10K+</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            
        </main>
    </body>
</html>
